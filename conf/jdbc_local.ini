# 本地 JDBC 联调：端口与 jdbc_client/BaseIntegrationTest 一致（3309）
# 数据目录使用仓库内 server/net/data；日志写入仓库 tmp 目录（无需 /var/log 权限）

[mysqld]
user		= xmysql
bind-address	= 127.0.0.1
port		= 3309
basedir		= /Users/zhukovasky/GolandProjects/xmysql-server
datadir		= /Users/zhukovasky/GolandProjects/xmysql-server/server/net/data
tmpdir		= /tmp
lc-messages-dir	= /usr/share/mysql
max_session_number = 1000
session_timeout = 60s
fail_fast_timeout = 5s
dev_bypass_password_auth = true

[innodb]
data_dir = /Users/zhukovasky/GolandProjects/xmysql-server/server/net/data
data_file_path = ibdata1:100M:autoextend
buffer_pool_size = 134217728
page_size = 16384
redo_log_dir = redo
undo_log_dir = undo
log_file_size = 50331648
log_buffer_size = 16777216
flush_log_at_trx_commit = 1
file_format = Barracuda
default_row_format = DYNAMIC
doublewrite = 1
adaptive_hash_index = 1

[session]
compress_encoding = false
tcp_no_delay = true
tcp_keep_alive = true
keep_alive_period = 180s
tcp_r_buf_size = 262144
tcp_w_buf_size = 65536
pkg_rq_size = 1024
pkg_wq_size = 1024
tcp_read_timeout = 1s
tcp_write_timeout = 5s
wait_timeout = 7s
max_msg_len = 16777216
session_name = xmysql-server

[logs]
log_error = /Users/zhukovasky/GolandProjects/xmysql-server/tmp/jdbc_logs/error.log
log_infos = /Users/zhukovasky/GolandProjects/xmysql-server/tmp/jdbc_logs/mysql.log
log_level = info
