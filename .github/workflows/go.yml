name: Go

on:
  push:
    branches: [ "dev" ]
  pull_request:
    branches: [ "dev" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.20'

      # ⚙️ 编译：排除 cmd/ 和 client/ 目录
      - name: Build
        run: |
          EXCLUDE_DIRS='/(cmd|client)(/|$)'
          PKGS=$(go list ./... | grep -vE "$EXCLUDE_DIRS")
          go build -v $PKGS

      # ✅ 测试：同样排除 cmd/ 和 client/ 目录
      - name: Test
        run: |
          EXCLUDE_DIRS='/(cmd|client)(/|$)'
          PKGS=$(go list ./... | grep -vE "$EXCLUDE_DIRS")
          go test -v $PKGS
